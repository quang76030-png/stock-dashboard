<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>📈 Dashboard chứng khoán tự động</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .price { font-size: 28px; font-weight: bold; }
        .positive { color: #22c55e; }
        .negative { color: #ef4444; }
        .update-time { text-align: center; margin-top: 30px; font-size: 14px; color: #94a3b8; }
        footer { text-align: center; margin-top: 40px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Dashboard thị trường chứng khoán Việt Nam</h1>
    <div class="grid" id="dashboard"></div>
    <div class="update-time" id="updateTime">Đang tải dữ liệu...</div>
    <footer>Dữ liệu được cập nhật tự động sau mỗi phiên giao dịch.</footer>
</div>
<script>
    async function loadData() {
        try {
            const response = await fetch('market_data.json');
            const data = await response.json();
            const grid = document.getElementById('dashboard');
            grid.innerHTML = '';
            for (let item of data) {
                const changeClass = item.change >= 0 ? 'positive' : 'negative';
                const sign = item.change >= 0 ? '+' : '';
                grid.innerHTML += `
                    <div class="card">
                        <h3>${item.ticker}</h3>
                        <div class="price">${item.price.toFixed(2)}</div>
                        <div class="${changeClass}">${sign}${item.change.toFixed(2)} (${sign}${item.changePercent.toFixed(2)}%)</div>
                        <div>KL: ${(item.volume / 1e6).toFixed(1)} tr</div>
                    </div>
                `;
            }
            document.getElementById('updateTime').innerHTML = `Cập nhật lần cuối: ${data[0]?.lastUpdate || 'chưa có'}`;
        } catch(e) {
            document.getElementById('dashboard').innerHTML = '<div style="text-align:center">Chưa có dữ liệu. Hệ thống sẽ tự cập nhật sau 15h30 hàng ngày.</div>';
        }
    }
    loadData();
</script>
</body>
</html>
